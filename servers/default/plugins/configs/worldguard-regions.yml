#
# WorldGuard regions file
#
regions:
    __global__:
        type: global
        priority: 0
        flags:
            time-lock: '12000'
            weather-lock: clear
            pvp: deny
            # # This flag is important. It ensures that the __global__ region's
            # # flags are checked even when no other regions are present.
            # passthrough: deny
        owners: {}
        members: {}
    lobby:
        min: {x: -20, y: 0, z: -20}
        max: {x: 20, y: 255, z: 20}
        type: cuboid
        priority: 1
        flags:
            invincible: allow               # Players can't take any damage

            build: deny                     # Denies placing/breaking blocks
            use: deny                       # Denies using blocks like doors, buttons, levers
            interact: deny                  # Denies interacting with crafting tables, anvils, etc.
            chest-access: deny              # Denies opening chests, furnaces, etc.
            
            item-pickup: deny               # Denies picking up items
            item-drop: deny                 # Denies dropping items
            item-frame-rotation: deny       # Denies rotating items in frames
            entity-painting-destroy: deny   # Denies breaking paintings
            entity-item-frame-destroy: deny # Denies breaking item frames
            
            pvp: deny                       # Denies player vs. player combat
            damage-animals: deny            # Denies hurting passive mobs
            mob-damage: deny                # Prevents mobs from damaging players
            
            enderpearl: deny                # Denies using ender pearls
            chorus-teleport: deny           # Denies eating chorus fruit
            
            sleep: deny                     # Denies using beds
            tnt: deny                       # Denies igniting TNT
            lighter: deny                   # Denies using flint and steel
            potion-splash: deny             # Denies splash potion effects
            
            creeper-explosion: deny         # Denies block damage from creepers
            other-explosion: deny           # Denies block damage from other explosions
            fire-spread: deny               # Denies fire spread
            lava-fire: deny                 # Denies lava starting fires
        owners: {}
        members: {}
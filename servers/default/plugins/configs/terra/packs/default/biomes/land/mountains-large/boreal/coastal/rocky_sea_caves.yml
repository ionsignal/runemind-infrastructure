id: ROCKY_SEA_CAVES
type: BIOME
extends: [EQ_SEA_CAVES, CARVING_OCEAN, BASE]
vanilla: minecraft:beach
color: $biomes/colors.yml:ROCKY_SEA_CAVES

tags:
  - LAND_CAVES
  - USE_RIVER
  - WILDERNESS_POOL

# Add this section to override the default blending behavior.
terrain:
  blend:
    # Default is 3. Let's increase this to 8 steps.
    distance: 6
    # Default is 4. Let's also increase this to 8 blocks per step.
    step: 6
    # Default is 1. A slightly higher weight will make neighbors more influential.
    weight: 1.5

palette:
  - BLOCK:minecraft:stone: 319
  - SAND: 62
  - << meta.yml:palette-bottom

slant:
  - threshold: 4
    palette:
      - BLOCK:minecraft:stone: 319
      - SAND: 62
      - << meta.yml:palette-bottom

features:
  slabs:
    - STONE_SLABS

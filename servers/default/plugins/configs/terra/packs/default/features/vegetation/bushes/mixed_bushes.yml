id: MIXED_BUSHES
type: FEATURE

# distributor:
#   type: SAMPLER
#   sampler:
#     type: POSITIVE_WHITE_NOISE
#   threshold: 0.01

distributor:
  type: AND
  distributors:
    # First, define the non-overlapping grid for tree placement.
    - type: PADDED_GRID
      width: 6 # The area within a grid cell where a tree can spawn.
      padding: 6 # The empty space around the width, ensuring no overlap.
      salt: 1991

    # Second, apply our density mask to the grid points.
    - type: SAMPLER
      threshold: 0 # The check passes if the sampler output is < 0.
      sampler:
        type: EXPRESSION
        variables:
          # This is your main control knob. 1.0 = max 100% dense, 0.5 = max 50% dense.
          max_density: 0.5
        # This expression evaluates to `random_number - probability`.
        # The check `(random - probability) < 0` is the same as `random < probability`.
        expression: "rand(x, z) - (((density(x, z) + 1) / 2) * max_density)"
        samplers:
          # A random number sampler, output is [0, 1].
          rand:
            dimensions: 2
            type: POSITIVE_WHITE_NOISE
            salt: 1992 # A new, unique salt.

          # The large-scale density map, output is [-1, 1].
          density:
            dimensions: 2
            type: CELLULAR
            return: Distance2Div # This creates sharp, irregular patterns.
            frequency: 0.01 # A higher frequency for smaller, more defined clumps.
            salt: 5000

locator:
  type: AND
  locators:
    - type: TOP
      range: &range
        min: 62
        max: 319
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks: $features/vegetation/meta.yml:plantable-blocks
        offset: -1
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks:
          - minecraft:snow
          - minecraft:air
        offset: 0

structures:
  distribution:
    type: WHITE_NOISE
  structures:
    - oak_bush: 8
    - spruce_bush: 5

name: vllm
description: 'High-Performance Unprivileged vLLM Engine'
config:
  # Container Security Baseline (Must be unprivileged for nvidia.runtime)
  security.nesting: 'true'
  security.privileged: 'false'

  # Boot & Auto-start
  boot.autostart: 'true'
  boot.autostart.priority: '100'

  # Nvidia Runtime Bridge
  nvidia.runtime: 'true'

  # Native LXD kernel limit for NCCL Shared Memory
  limits.kernel.memlock: unlimited

devices:
  # Network Interface
  eth0:
    name: eth0
    network: incusbr0
    type: nic
    ipv4.address: 10.10.10.50
    # Hypervisor-level anti-spoofing remains active for network hygiene
    security.ipv4_filtering: 'true'
    security.mac_filtering: 'true'

  # Root Filesystem (Ephemeral OS drive)
  root:
    path: /
    pool: is-nvme-pool
    type: disk

  # ZFS Model Vault (Direct NVMe mount)
  model-vault:
    source: is-model-vault
    pool: is-nvme-pool
    path: /models
    type: disk

  # GPU Passthrough (Map all 4x RTX A4000s natively)
  all-gpus:
    type: gpu

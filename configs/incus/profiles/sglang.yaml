name: sglang
description: 'Unprivileged Qwen MoE AI Inference Engine (SGLang)'
config:
  # Container Security Baseline
  security.nesting: 'false'
  security.privileged: 'false'

  # Boot & Auto-start
  boot.autostart: 'true'
  boot.autostart.priority: '100' # Start before game servers

  # Nvidia Runtime
  nvidia.runtime: 'true'

  # Resource Limits (Protects the host OS and ZFS ARC)
  limits.cpu: '8'
  limits.memory: '64GB'

devices:
  # Network Interface
  eth0:
    name: eth0
    network: incusbr0
    type: nic
    ipv4.address: 10.10.10.50
    security.ipv4_filtering: 'true'
    security.mac_filtering: 'true'

  # Root Filesystem (Ephemeral OS drive)
  root:
    path: /
    pool: default
    type: disk

  # ZFS Model Vault (Direct NVMe mount)
  model-vault:
    source: is-model-vault
    pool: is-nvme-pool
    path: /models
    type: disk

  # GPU Passthrough (Map all 4x RTX A4000s natively)
  all-gpus:
    type: gpu

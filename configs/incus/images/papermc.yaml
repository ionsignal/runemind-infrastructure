image:
  distribution: ubuntu
  release: noble
  architecture: amd64
  description: 'Immutable PaperMC Edge Server (1.21.10)'

source:
  downloader: debootstrap
  url: http://archive.ubuntu.com/ubuntu
  keyserver: keyserver.ubuntu.com
  keys:
    - 0xF6ECB3762474EDA9D21B7022871920D1991BC93C # Ubuntu Archive Automatic Signing Key (2018)

packages:
  manager: apt
  update: true
  cleanup: true
  sets:
    # Early Packages (Installed during debootstrap phase)
    - packages:
        - ca-certificates
        - wget
      action: install
      early: true

    # Standard Packages (Installed after repositories are added)
    - packages:
        - tzdata
        - tar
        - vim
        - systemd
        - systemd-sysv
        - netplan.io
        - iproute2
        - locales
        - temurin-21-jre
      action: install

  repositories:
    # Standard Ubuntu Repositories (Fixes debootstrap's minimal sources.list)
    - name: sources.list
      url: |-
        deb http://archive.ubuntu.com/ubuntu {{ image.release }} main restricted universe multiverse
        deb http://archive.ubuntu.com/ubuntu {{ image.release }}-updates main restricted universe multiverse
        deb http://security.ubuntu.com/ubuntu {{ image.release }}-security main restricted universe multiverse

    # Adoptium Repository & Native GPG Key Injection
    - name: adoptium.list
      url: |-
        deb [signed-by=/etc/apt/keyrings/adoptium.asc] https://packages.adoptium.net/artifactory/deb {{ image.release }} main

actions:
  # POST-UNPACK: Bootstrap wget and fetch the Adoptium key dynamically
  - trigger: post-unpack
    action: |-
      #!/bin/sh
      set -eux

      # Create the modern keyrings directory
      mkdir -p /etc/apt/keyrings

      # Download the official Adoptium GPG key directly to the keyring
      wget -qO /etc/apt/keyrings/adoptium.asc https://packages.adoptium.net/artifactory/api/gpg/key/public

  # POST-PACKAGES: System Scaffolding & Artifact Retrieval
  # (Must run here because wget/gnupg are now installed)
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -e

      # Create the unprivileged service user
      groupadd -g 1000 minecraft
      useradd -u 1000 -g 1000 -s /usr/sbin/nologin -d /opt/minecraft minecraft

      # Create strictly scoped directories (Mount points for ZFS)
      mkdir -p /opt/minecraft/plugins
      mkdir -p /opt/minecraft/world
      mkdir -p /opt/minecraft/config

      # Download PaperMC (1.21.10 latest build)
      wget -qO /opt/minecraft/paper.jar "https://fill-data.papermc.io/v1/objects/158703f75a26f842ea656b3dc6d75bf3d1ec176b97a2c36384d0b80b3871af53/paper-1.21.10-130.jar"

      # Lock down ownership to the unprivileged user
      chown -R minecraft:minecraft /opt/minecraft

      # Accept the EULA
      echo "eula=true" > /opt/minecraft/eula.txt
      chown minecraft:minecraft /opt/minecraft/eula.txt

  # POST-FILES: Final Configuration & Boot Preparation
  # (Must run here because the papermc.service file now exists)
  - trigger: post-files
    action: |-
      #!/bin/sh
      set -e

      # Enable the systemd service so it boots automatically
      ln -s /etc/systemd/system/papermc.service /etc/systemd/system/multi-user.target.wants/papermc.service

files:
  # Clear machine-id so systemd generates a unique one per container on first boot
  - path: /etc/machine-id
    generator: dump
  - path: /var/lib/dbus/machine-id
    generator: remove

  # Configure Netplan to use DHCP on eth0 so the container gets an IP
  - path: /etc/netplan/10-lxc.yaml
    generator: dump
    content: |-
      network:
        version: 2
        ethernets:
          eth0:
            dhcp4: true
            dhcp-identifier: mac

  # The Zero-Logic Systemd Entrypoint
  - path: /etc/systemd/system/papermc.service
    generator: dump
    mode: '0644'
    content: |-
      [Unit]
      Description=PaperMC Edge Server
      After=network.target

      [Service]
      Type=simple
      User=minecraft
      Group=minecraft
      WorkingDirectory=/opt/minecraft
      PassEnvironment=ION_TENANT_ID ION_JVM_ARGS
      ExecStart=/usr/bin/java $ION_JVM_ARGS -jar paper.jar --nogui
      SuccessExitStatus=143
      Restart=on-failure
      RestartSec=5
      StandardInput=null
      KillSignal=SIGTERM
      TimeoutStopSec=120

      [Install]
      WantedBy=multi-user.target

# META: Identity and base image
name: papermc
display_name: PaperMC Edge Server
description: Stateless PaperMC server with dynamic isolated ZFS vaults.
image_alias: papermc

# PROVISIONING: Fastify's Pre-flight and Post-flight execution saga
provisioning:
  # Pre-Flight: Volumes Fastify must create BEFORE calling the Incus Instance API
  volumes:
    - name: world
      type: clone
      pool: is-nvme-pool
      source_vault: is-world-vault
      shifted: true # Instructs Fastify to apply config: {'security.shifted': 'true'}
      mount_path: /opt/minecraft/world

    - name: plugins
      type: clone
      pool: is-nvme-pool
      source_vault: is-plugins-vault
      shifted: true
      mount_path: /opt/minecraft/plugins

  # Post-Flight: Files Fastify must push via File API AFTER the container is created
  files:
    - path: /opt/minecraft/jvm.env
      uid: 1000
      gid: 1000
      mode: '0644'
      # Fastify will parse {{ variables }} using data from the Postgres Ledger
      content: |
        ION_JVM_ARGS="-Xms{{ limits.memory.java }} -Xmx{{ limits.memory.java }}"

    - path: /opt/minecraft/server.properties
      uid: 1000
      gid: 1000
      mode: '0644'
      content: |
        server-port=25565
        online-mode=false

#INSTANCE TEMPLATE: The base payload for the Incus API
instance_template:
  config:
    security.privileged: 'false'
    security.nesting: 'false'
    boot.autostart: 'false'
    # Fastify will dynamically inject:
    # - environment.ION_TENANT_ID
    # - limits.cpu
    # - limits.memory

  devices:
    eth0:
      type: nic
      network: incusbr0
      security.ipv4_filtering: 'true'
      security.mac_filtering: 'true'
    root:
      type: disk
      pool: is-nvme-pool
      path: /
    # Fastify will dynamically inject the `world` and `plugins` disk devices here
    # based on the pre-flight volumes created above.

# 4. APPLICATION: Metadata for routing and the Vue UI (Data Plane)
application:
  ports:
    - name: game
      port: 25565
      protocol: tcp
  editable_files:
    - path: /opt/minecraft/server.properties
      format: properties
      schema: ServerPropertiesSchema

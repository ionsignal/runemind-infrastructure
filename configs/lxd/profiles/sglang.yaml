name: sglang
description: "Unprivileged Qwen MoE AI Inference Engine (SGLang/vLLM)"
config:
  # Container Security Baseline
  security.nesting: "false"
  security.privileged: "false"

  # Boot & Auto-start
  boot.autostart: "true"
  boot.autostart.priority: "100" # Start before game servers

  # Nvidia Runtime
  nvidia.runtime: "true"

  # Resource Limits (Protects the host OS and ZFS ARC)
  limits.cpu: "16"
  limits.memory: "64GB"

  # ZERO-WASTE CACHE REDIRECTION:
  environment.HF_HOME: "/models/huggingface"
  environment.TRITON_CACHE_DIR: "/models/triton"
  environment.XDG_CACHE_HOME: "/models/xdg"
  environment.SGLANG_CACHE_DIR: "/models/sglang"

devices:
  # Network Interface
  eth0:
    name: eth0
    network: lxdbr0
    type: nic
    ipv4.address: 10.10.10.50
    security.ipv4_filtering: "true"
    security.mac_filtering: "true"

  # Root Filesystem (Ephemeral OS drive)
  root:
    path: /
    pool: default
    type: disk

  # ZFS Model Vault (Direct NVMe mount)
  model-vault:
    source: is-model-vault
    pool: is-nvme-pool
    path: /models
    type: disk

  # GPU Passthrough (Map all 4x RTX A4000s natively)
  all-gpus:
    type: gpu

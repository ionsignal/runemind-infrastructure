  # POST-PACKAGES: Systemd Initialization & Cleanup
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -eux

      # Ensure locales are valid for Java
      locale-gen en_US.UTF-8
      update-locale LANG=en_US.UTF-8

      # Enable systemd-networkd for Netplan
      systemctl enable systemd-networkd

      # Cleanup underlying /run from the build environment to prevent boot conflicts
      mount -o bind / /mnt
      rm -rf /mnt/run/*
      umount /mnt

  # POST-PACKAGES: System Scaffolding & Artifact Retrieval
  # (Must run here because wget/gnupg are now installed)
  - trigger: post-packages
    action: |-
      #!/bin/sh
      set -e

      # Create the unprivileged service user
      groupadd -g 1000 minecraft
      useradd -u 1000 -g 1000 -s /usr/sbin/nologin -d /opt/minecraft minecraft

      # Create strictly scoped directories (Mount points for ZFS)
      mkdir -p /opt/minecraft/plugins
      mkdir -p /opt/minecraft/world
      mkdir -p /opt/minecraft/config

      # Download PaperMC (1.21.10 latest build)
      wget -qO /opt/minecraft/paper.jar "https://fill-data.papermc.io/v1/objects/158703f75a26f842ea656b3dc6d75bf3d1ec176b97a2c36384d0b80b3871af53/paper-1.21.10-130.jar"

      # Lock down ownership to the unprivileged user
      chown -R minecraft:minecraft /opt/minecraft

      # Accept the EULA
      echo "eula=true" > /opt/minecraft/eula.txt
      chown minecraft:minecraft /opt/minecraft/eula.txt

  # POST-FILES: Final Configuration & Boot Preparation
  # (Must run here because the papermc.service file now exists)
  - trigger: post-files
    action: |-
      #!/bin/sh
      set -e

      # Enable the systemd service so it boots automatically
      ln -s /etc/systemd/system/papermc.service /etc/systemd/system/multi-user.target.wants/papermc.service

files:
  # Clear machine-id so systemd generates a unique one per container on first boot
  - path: /etc/machine-id
    generator: dump
  - path: /var/lib/dbus/machine-id
    generator: remove

  # Configure Netplan to use DHCP on eth0 so the container gets an IP
  - path: /etc/netplan/10-lxc.yaml
    generator: dump
    content: |-
      network:
        version: 2
        ethernets:
          eth0:
            dhcp4: true
            dhcp-identifier: mac

  # The Zero-Logic Systemd Entrypoint
  - path: /etc/systemd/system/papermc.service
    generator: dump
    mode: '0644'
    content: |-
      [Unit]
      Description=PaperMC Edge Server
      After=network.target

      [Service]
      Type=simple
      User=minecraft
      Group=minecraft
      WorkingDirectory=/opt/minecraft
      PassEnvironment=ION_TENANT_ID ION_JVM_ARGS
      ExecStart=/usr/bin/java $ION_JVM_ARGS -jar paper.jar --nogui
      SuccessExitStatus=143
      Restart=on-failure
      RestartSec=5
      StandardInput=null
      KillSignal=SIGTERM
      TimeoutStopSec=120

      [Install]
      WantedBy=multi-user.target

image:
  distribution: ubuntu
  release: noble
  architecture: amd64
  description: 'Immutable PaperMC Edge Server (1.21.10)'

source:
  downloader: debootstrap
  url: http://archive.ubuntu.com/ubuntu
  keyserver: keyserver.ubuntu.com
  keys:
    - 0xF6ECB3762474EDA9D21B7022871920D1991BC93C # Ubuntu Archive Automatic Signing Key (2018)

packages:
  manager: apt
  update: true
  cleanup: true
  sets:
    - packages:
        - ca-certificates
        - tzdata
        - wget
        - tar
        - systemd
        - systemd-sysv
        - netplan.io
        - iproute2
        - locales
        - temurin-21-jre
      action: install

  repositories:
    # Standard Ubuntu Repositories (Fixes debootstrap's minimal sources.list)
    - name: sources.list
      url: |-
        deb http://archive.ubuntu.com/ubuntu {{ image.release }} main restricted universe multiverse
        deb http://archive.ubuntu.com/ubuntu {{ image.release }}-updates main restricted universe multiverse
        deb http://security.ubuntu.com/ubuntu {{ image.release }}-security main restricted universe multiverse

    # Adoptium Repository & Native GPG Key Injection
    - name: adoptium.list
      url: |-
        deb [signed-by=/etc/apt/keyrings/adoptium.asc] https://packages.adoptium.net/artifactory/deb {{ image.release }} main


description: "Base profile for Minecraft Network containers (Velocity, PaperMC, etc.)"
config:
  user.user-data: |
    #cloud-config
    # Enable immediate package updates and upgrades on first boot
    package_update: true
    package_upgrade: true

    # Install essential base packages and tools
    packages:
      - vim
      - git
      - wget
      - curl
      - screen
      - tmux
      - iputils-ping
      - net-tools
      - dnsutils
      - locales
      - tzdata
      - ca-certificates
      - apt-transport-https
      - gnupg
      - bash-completion

    # Commands to execute after package installation
    runcmd:
      # --- Basics
      - ['sed', '-i', 's/^#\(force_color_prompt=yes\)/\1/', '/root/.bashrc']
      - ['/bin/bash', '-c', "grep -q -F 'alias ls' /root/.bashrc || echo 'alias ls=\"ls --color=auto\"' >> /root/.bashrc"]

      # --- Configure Timezone and Locales ---
      - timedatectl set-timezone UTC
      - locale-gen en_US.UTF-8

      # --- Add Adoptium (Temurin) Repository for Java 21 ---
      - mkdir -p /etc/apt/keyrings
      - wget -O - https://packages.adoptium.net/artifactory/api/gpg/key/public | tee /etc/apt/keyrings/adoptium.asc
      - echo "deb [signed-by=/etc/apt/keyrings/adoptium.asc] https://packages.adoptium.net/artifactory/deb $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/adoptium.list
      - apt-get update
      - apt-get install -y temurin-21-jdk

      # --- Create Skeleton Directory Structure for Minecraft Servers ---
      - mkdir -p /opt/minecraft/server
      - mkdir -p /opt/minecraft/logs
      - mkdir -p /opt/minecraft/data

      # --- Create Dedicated Minecraft User ---
      - adduser --system --home /opt/minecraft --disabled-password --no-create-home --group minecraft

      # --- Set Ownership ---
      - chown -R minecraft:minecraft /opt/minecraft

      # --- Create .ssh directory and write SSH key file ---
      # Create the .ssh directory with correct permissions and ownership
      - mkdir -p /opt/minecraft/.ssh
      - chown minecraft:minecraft /opt/minecraft/.ssh
      - chmod 700 /opt/minecraft/.ssh
      # Write the SSH key file using 'install' for atomic creation with permissions/owner
      - |
        install -m 0600 -o minecraft -g minecraft /dev/stdin /opt/minecraft/.ssh/id_ed25519 << 'EOF'
        -----BEGIN OPENSSH PRIVATE KEY-----
        b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
        QyNTUxOQAAACCkT30N2QwoGts0LaZ4QgVnrOBUuW1NUe8V4VHFfMaB7AAAAKgyWUkVMllJ
        FQAAAAtzc2gtZWQyNTUxOQAAACCkT30N2QwoGts0LaZ4QgVnrOBUuW1NUe8V4VHFfMaB7A
        AAAEAq7wAYlHttUalqYL4u9ROZQ6ntcFIyNiSGXXN2/h1XaaRPfQ3ZDCga2zQtpnhCBWes
        4FS5bU1R7xXhUcV8xoHsAAAAJG1pbmVjcmFmdC1kZXBsb3kta2V5LW1jLXNlcnZlci1sb2
        JieQE=
        -----END OPENSSH PRIVATE KEY-----
        EOF

      # --- Install and Configure Prometheus Node Exporter for Monitoring ---
      # Create dedicated user for node_exporter for security
      - useradd --no-create-home --shell /bin/false node_exporter
      # Download, extract, and move Node Exporter binary
      - |
        wget https://github.com/prometheus/node_exporter/releases/download/v1.9.1/node_exporter-1.9.1.linux-amd64.tar.gz -P /tmp
        tar xvfz /tmp/node_exporter-1.9.1.linux-amd64.tar.gz -C /tmp
        mv /tmp/node_exporter-1.9.1.linux-amd64/node_exporter /usr/local/bin/
        rm -rf /tmp/node_exporter* # Clean up temporary files
      # Create systemd service unit file for Node Exporter
      - |
        cat << 'EOF' > /etc/systemd/system/node_exporter.service
        [Unit]
        Description=Prometheus Node Exporter
        Wants=network-online.target
        After=network-online.target

        [Service]
        User=node_exporter
        Group=node_exporter
        Type=simple
        ExecStart=/usr/local/bin/node_exporter --web.listen-address=":9100"
        Restart=on-failure

        [Install]
        WantedBy=multi-user.target
        EOF
      # Reload systemd, enable and start Node Exporter service
      - systemctl daemon-reload
      - systemctl enable --now node_exporter
devices:
  eth0:
    name: eth0
    nictype: bridged
    parent: br0
    type: nic
  root:
    path: /
    pool: is-sd-zfsnvme
    size: 128GB
    type: disk

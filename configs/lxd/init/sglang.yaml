#cloud-config
package_update: true
package_upgrade: true
packages:
  - python3-pip
  - python3-venv
  - python3-dev
  - build-essential
  - git
  - nvtop

# User Provisioning
users:
  - name: sglang
    system: true
    shell: /usr/sbin/nologin
    homedir: /opt/sglang
    groups: [video, render]

# File Provisioning
write_files:
  # Environment
  - path: /etc/default/sglang
    owner: root:root
    permissions: "0640"
    content: |
      HF_HOME=/models/huggingface
      TRITON_CACHE_DIR=/models/triton
      XDG_CACHE_HOME=/models/xdg
      SGLANG_CACHE_DIR=/models/sglang
      CUDA_HOME=/opt/sglang/venv
  # The Shell Bridge
  - path: /etc/profile.d/sglang.sh
    owner: root:root
    permissions: "0644"
    content: |
      # Automatically export AI Vault variables for interactive troubleshooting
      set -a
      source /etc/default/sglang 2>/dev/null
      set +a

# Command Execution
runcmd:
  # Secure the environment file now that the 'sglang' user exists
  - chown root:sglang /etc/default/sglang

  # Prepare the persistent ZFS NVMe vault sub-directories
  - mkdir -p /models/huggingface /models/triton /models/xdg /models/sglang

  # Grant the service account ownership of the persistent ZFS directories
  - chown sglang:sglang /models/huggingface /models/triton /models/xdg /models/sglang

  # Explicitly create the home directory for the system user
  - mkdir -p /opt/sglang

  # Inject Ubuntu Skeleton files for colored interactive shells
  - cp /etc/skel/.bashrc /etc/skel/.profile /etc/skel/.bash_logout /opt/sglang/
  - sed -i 's/#force_color_prompt=yes/force_color_prompt=yes/g' /opt/sglang/.bashrc

  # Secure the local application launchpad
  - chown -R sglang:sglang /opt/sglang
  - chmod 700 /opt/sglang

  # Create the isolated Python Virtual Environment as the unprivileged user
  - sudo -u sglang python3 -m venv /opt/sglang/venv

  # Upgrade pip inside the virtual environment
  - sudo -u sglang /opt/sglang/venv/bin/pip install --upgrade pip

  # Install Nvidia user-space compiler (nvcc) for JIT Triton kernels
  - sudo -u sglang /opt/sglang/venv/bin/pip install --no-cache-dir nvidia-cuda-nvcc-cu12 nvidia-cuda-runtime-cu12

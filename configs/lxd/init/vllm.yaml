#cloud-config
package_update: true
package_upgrade: true
packages:
  - python3-pip
  - python3-venv
  - python3-dev
  - build-essential
  - git
  - nvtop

users:
  - name: vllm
    system: true
    shell: /bin/bash
    homedir: /opt/vllm
    groups: [video, render]

write_files:
  - path: /etc/default/vllm
    owner: root:root
    permissions: "0640"
    content: |
      PATH=/opt/vllm/venv/bin:/usr/local/cuda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      VIRTUAL_ENV=/opt/vllm/venv
      HF_HOME=/models/huggingface
      UV_CACHE_DIR=/models/uv_cache
      PIP_CACHE_DIR=/models/pip_cache
      PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      NCCL_DEBUG=TRACE
      NCCL_P2P_LEVEL=PHB
      NCCL_SHM_DISABLE=0
      NCCL_P2P_DISABLE=0
      NCCL_DEBUG_SUBSYS=INIT,ENV,GRAPH,NET
      NCCL_DEBUG_FILE=/opt/vllm/nccl_debug_%h_%p.log
      VLLM_CACHE_ROOT=/models/vllm
      VLLM_MARLIN_USE_ATOMIC_ADD=1
      API_SERVER_ARGS="--model Qwen/Qwen3.5-35B-A3B-FP8 --host 0.0.0.0 --port 8080 --tensor-parallel-size 4 --attention-backend flashinfer --gpu-memory-utilization 0.80 --max-model-len 2048 --max-num-seqs 64 --enable-chunked-prefill --max-num-batched-tokens 2048 --enable-prefix-caching --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen25 --disable-custom-all-reduce"

  - path: /etc/profile.d/vllm.sh
    owner: root:root
    permissions: "0644"
    content: |
      set -a
      source /etc/default/vllm 2>/dev/null
      set +a

runcmd:
  - chown root:vllm /etc/default/vllm

  # Inject Official NVIDIA Repository & Install CUDA Toolkit / Ninja
  - wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
  - dpkg -i cuda-keyring_1.1-1_all.deb
  - apt-get update

  # Install CUDA Toolkit 12.8 & Ninja (Generates /usr/local/cuda symlink natively)
  - apt-get install -y --no-install-recommends cuda-toolkit-12-8 ninja-build

  # Ensure vault permissions align with the unprivileged container UID mapping
  - mkdir -p /models/huggingface /models/vllm  /models/uv_cache /models/pip_cache
  - chown -R vllm:vllm /models

  # Setup home directory
  - mkdir -p /opt/vllm
  - cp /etc/skel/.bashrc /etc/skel/.profile /etc/skel/.bash_logout /opt/vllm/
  - sed -i 's/#force_color_prompt=yes/force_color_prompt=yes/g' /opt/vllm/.bashrc
  - chown -R vllm:vllm /opt/vllm
  - chmod 700 /opt/vllm

  # Build the environment and install vLLM
  - sudo -u vllm python3 -m venv /opt/vllm/venv
  - sudo -u vllm bash -c 'source /opt/vllm/venv/bin/activate && source /etc/default/vllm && pip install uv'
  - sudo -u vllm bash -c 'source /opt/vllm/venv/bin/activate && source /etc/default/vllm && uv pip install vllm==0.17.1 ray'
